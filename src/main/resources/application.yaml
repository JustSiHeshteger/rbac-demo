spring:
  application:
    name: rbac-demo

  r2dbc:
    url: r2dbc:postgresql://localhost:12003/rbac-demo
    username: postgres
    password: root

  liquibase:
    url: jdbc:postgresql://localhost:12003/rbac-demo
    user: postgres
    password: root
    enabled: true
    analytics-enabled: true
    change-log: classpath:db/changelog/changelog-master.xml

  web:
    error:
      include-binding-errors: always
      include-message: always

  data:
    redis:
      host: localhost
      port: 12004
      username: default
      password: root

logging:
  level:
    io:
      r2dbc:
        postgresql:
          QUERY: DEBUG
          PARAM: DEBUG

